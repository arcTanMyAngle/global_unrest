name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        # Windows is the primary desktop target; Ubuntu keeps the M4
        # (Dockerized services) path honest. All tests are headless.
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the actual version; this installs rustup glue.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # The bundled DuckDB/SQLite C and C++ builds dominate cold CI time;
      # rust-cache makes warm runs tolerable.
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
