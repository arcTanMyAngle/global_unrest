# cargo-deny config — https://embarkstudios.github.io/cargo-deny/
# CI job: .github/workflows/ci.yml (cargo-deny). Run locally with
# `cargo deny check` (needs `cargo install cargo-deny` once).

[graph]
# Desktop binaries ship for all three; services/api and services/workers
# only ever run on Linux (Docker), but keeping targets in sync with the
# release matrix (release.yml) avoids target-specific advisory blind spots.
targets = [
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
]

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # quick-xml DoS-class advisories (quadratic attribute scan / unbounded
    # namespace allocation) reach us only via wayland-scanner, which uses
    # quick-xml at *build time* to codegen bindings from its own bundled,
    # trusted Wayland protocol XML — never on attacker-controlled input at
    # runtime. Fixing requires bumping winit's Wayland backend stack
    # (smithay-client-toolkit), which is out of scope for a point release;
    # re-check next time eframe/winit are bumped.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # ttf-parser is unmaintained with "no safe upgrade available" (author's
    # own advisory). Reached only via ab_glyph -> sctk-adwaita, the Linux
    # Wayland clipboard's decorative-font fallback — not on any input path
    # this app feeds untrusted data through. Revisit if winit drops it.
    "RUSTSEC-2026-0192",
]

[licenses]
# MIT OR Apache-2.0 (workspace.package.license) plus every permissive
# license actually present in the tree: BSL-1.0 (clipboard-win/error-code,
# via arboard's Windows clipboard backend), OFL-1.1 + Ubuntu-font-1.0
# (egui's bundled default fonts), CDLA-Permissive-2.0 (webpki-roots).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
# Duplicate versions happen a lot in a graph this size (wgpu/eframe pull
# their own transitive trees) — worth seeing, not worth failing CI over.
multiple-versions = "warn"
wildcards = "deny"
# Internal workspace crates depend on each other via bare `{ path = ... }`
# (no version req — see root Cargo.toml's [workspace.dependencies]), which
# cargo-deny otherwise flags as an unbounded "wildcard" dependency. That
# check exists for external deps; our own workspace members aren't it.
allow-wildcard-paths = true
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
